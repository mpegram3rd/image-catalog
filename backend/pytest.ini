[tool:pytest]
# Pytest configuration for image-catalog backend tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output and formatting
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --durations=10

# Coverage options (when using pytest-cov)
# Run with: pytest --cov=. --cov-report=html
# Or use: uv run test-cov

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use database)
    slow: Slow running tests
    database: Tests that require database connections

# Async support
asyncio_mode = auto

# Warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning:pkg_resources.*
    ignore::PendingDeprecationWarning

# Test logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
