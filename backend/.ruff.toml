# Ruff configuration for image-catalog backend
target-version = "py313"
line-length = 100

[lint]
# Enable comprehensive rule sets
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "I",    # isort
    "N",    # pep8-naming
    "D",    # pydocstyle
    "S",    # flake8-bandit
    "T20",  # flake8-print
    "PL",   # Pylint
    "RUF",  # Ruff-specific rules
]

# Ignore specific rules that may be too strict for this codebase
ignore = [
    "D100",   # Missing docstring in public module
    "D101",   # Missing docstring in public class
    "D102",   # Missing docstring in public method
    "D103",   # Missing docstring in public function
    "D104",   # Missing docstring in public package
    "D107",   # Missing docstring in `__init__`
    "S101",   # Use of assert detected
    "T201",   # print found (we'll fix these systematically)
]

[lint.per-file-ignores]
# Test files can have additional flexibility
"tests/**/*.py" = [
    "S101",   # Use of assert in tests is fine
    "D",      # Don't require docstrings in tests
    "PLR2004", # Magic values in tests are common
]

# Configuration files and scripts
"scripts/**/*.py" = ["T201", "D"]
"conftest.py" = ["D"]

[format]
# Use single quotes and trailing commas
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[lint.pydocstyle]
# Use Google-style docstrings
convention = "google"

[lint.isort]
known-first-party = ["configuration", "models", "repository", "ai", "images", "api_routes", "mcp_tools"]